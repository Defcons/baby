name = "pelvic-reminders"
main = "index.js"
compatibility_date = "2026-07-16"

# reminder check cadence
[triggers]
crons = ["*/5 * * * *"]

# Create the namespace first, then paste its id here:
#   npx wrangler kv namespace create STATE
[[kv_namespaces]]
binding = "STATE"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
