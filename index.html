<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contraction Timer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #14110f;
    color: #f0ece6;
    min-height: 100vh;
    padding: 20px 16px 40px;
    max-width: 560px;
    margin: 0 auto;
  }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; letter-spacing: -0.01em; }
  .sub { color: #8a827a; font-size: 13px; margin-bottom: 20px; }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 18px;
  }
  .stat {
    background: #1e1a17;
    border: 1px solid #2c2621;
    border-radius: 14px;
    padding: 14px;
  }
  .stat .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #8a827a; margin-bottom: 5px; }
  .stat .value { font-size: 22px; font-weight: 600; }
  .stat .value.small { font-size: 15px; font-weight: 500; }

  .status {
    text-align: center;
    padding: 10px;
    border-radius: 12px;
    margin-bottom: 16px;
    font-size: 14px;
    font-weight: 500;
    background: #1e1a17;
    border: 1px solid #2c2621;
  }
  .status.go { background: #3a1512; border-color: #7a2820; color: #ff9d8a; }
  .status.soon { background: #33270f; border-color: #6b5217; color: #f0c060; }

  .bigbtn {
    width: 100%;
    padding: 26px;
    font-size: 20px;
    font-weight: 600;
    border: none;
    border-radius: 16px;
    color: #fff;
    cursor: pointer;
    transition: transform 0.08s, background 0.2s;
    margin-bottom: 12px;
  }
  .bigbtn:active { transform: scale(0.98); }
  .start { background: #b5442f; }
  .stop { background: #8a2018; animation: pulse 1.4s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.82; } }

  .running-timer { text-align: center; font-size: 40px; font-weight: 700; margin: 6px 0 14px; font-variant-numeric: tabular-nums; }
  .running-timer.hidden { display: none; }

  .secondary { display: flex; gap: 10px; margin-bottom: 22px; }
  .secondary button {
    flex: 1;
    padding: 12px;
    font-size: 13px;
    border-radius: 10px;
    border: 1px solid #2c2621;
    background: #1e1a17;
    color: #c9c1b8;
    cursor: pointer;
  }
  .secondary button:active { background: #2c2621; }

  h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; color: #8a827a; margin-bottom: 10px; }
  .log { list-style: none; }
  .log li {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 12px;
    align-items: center;
    padding: 12px 4px;
    border-bottom: 1px solid #241f1b;
    font-size: 14px;
  }
  .log li .time { color: #c9c1b8; }
  .log li .dur { font-variant-numeric: tabular-nums; color: #f0ece6; }
  .log li .gap { font-variant-numeric: tabular-nums; color: #8a827a; font-size: 12px; min-width: 62px; text-align: right; }
  .empty { color: #6b635b; font-size: 14px; padding: 8px 4px; }
  .saved-note { font-size: 11px; color: #6b635b; text-align: center; margin-top: 18px; }
  .saved-note.ok { color: #6f9a6f; }
  .saved-note.warn { color: #b08a4f; }
</style>
</head>
<body>
  <h1>Contraction Timer</h1>
  <div class="sub">Tap start when one begins, stop when it ends.</div>

  <div class="stats">
    <div class="stat">
      <div class="label">Avg frequency (last 5)</div>
      <div class="value" id="avgFreq">—</div>
    </div>
    <div class="stat">
      <div class="label">Avg duration (last 5)</div>
      <div class="value" id="avgDur">—</div>
    </div>
    <div class="stat">
      <div class="label">Last gap</div>
      <div class="value small" id="lastGap">—</div>
    </div>
    <div class="stat">
      <div class="label">Total logged</div>
      <div class="value" id="total">0</div>
    </div>
  </div>

  <div class="status" id="status">Waiting for first contraction</div>

  <div class="running-timer hidden" id="runningTimer">0:00</div>
  <button class="bigbtn start" id="mainBtn">Start contraction</button>

  <div class="secondary">
    <button id="undoBtn">Undo last</button>
    <button id="resetBtn">Reset all</button>
  </div>

  <h2>Log</h2>
  <ul class="log" id="logList">
    <li class="empty">No contractions yet.</li>
  </ul>

  <div class="saved-note" id="syncNote">Saved automatically to this device.</div>

<script>
  const STORAGE_KEY = 'contractionLog_v2';
  const ROOM_KEY = 'syncRoom_v1';
  const SYNC_URL = 'https://contraction-sync.davidsen908.workers.dev';
  const POLL_MS = 4000;

  let contractions = [];
  let active = null;
  let tick = null;
  let revision = 0;          // wall-clock ms of the last local mutation; higher revision wins
  let syncOk = null;         // null = unknown, true = synced, false = offline/error

  // ---- sync room: taken from #r=... in the shared link, then remembered per device ----
  const hashRoom = (location.hash.match(/r=([a-z0-9-]{8,64})/i) || [])[1];
  if (hashRoom) { try { localStorage.setItem(ROOM_KEY, hashRoom.toLowerCase()); } catch(e) {} }
  const room = hashRoom ? hashRoom.toLowerCase() : (localStorage.getItem(ROOM_KEY) || null);

  // ---- persistence ----
  function save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ revision, contractions, active }));
    } catch(e) { /* private mode / full storage - ignore */ }
  }
  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const data = JSON.parse(raw);
        revision = data.revision || 0;
        contractions = data.contractions || [];
        if (data.active && data.active.start) active = data.active;
        return;
      }
      // migrate v1 data (pre-sync version) if present
      const old = localStorage.getItem('contractionLog_v1');
      if (old) {
        const data = JSON.parse(old);
        contractions = data.contractions || [];
        if (data.active && data.active.start) active = data.active;
        if (contractions.length || active) revision = Date.now();
        save();
      }
    } catch(e) { contractions = []; }
  }

  // ---- cross-device sync (last write wins by revision) ----
  function setSyncNote(state) {
    const el = document.getElementById('syncNote');
    if (!room) {
      el.className = 'saved-note';
      el.textContent = 'Saved to this device only — open the shared sync link to share the log.';
    } else if (state === true) {
      el.className = 'saved-note ok';
      el.textContent = 'Synced across devices ✓';
    } else if (state === false) {
      el.className = 'saved-note warn';
      el.textContent = 'Offline — saved on this device, will sync when connection returns.';
    } else {
      el.className = 'saved-note';
      el.textContent = 'Connecting to sync…';
    }
  }

  function pushState() {
    if (!room) return;
    fetch(`${SYNC_URL}/state/${room}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ revision, contractions, active }),
    })
      .then(r => { syncOk = r.ok; setSyncNote(syncOk); })
      .catch(() => { syncOk = false; setSyncNote(false); });
  }

  function applyRemote(remote) {
    revision = remote.revision;
    contractions = remote.contractions || [];
    active = (remote.active && remote.active.start) ? remote.active : null;
    save();
    updateMainUI();
    render();
  }

  async function pull() {
    if (!room) return;
    try {
      const res = await fetch(`${SYNC_URL}/state/${room}`, { cache: 'no-store' });
      if (!res.ok) throw 0;
      const remote = await res.json();
      syncOk = true; setSyncNote(true);
      if (remote && remote.revision > revision) applyRemote(remote);
      else if (!remote || remote.revision < revision) pushState(); // we're ahead (e.g. logged while offline)
    } catch(e) {
      syncOk = false; setSyncNote(false);
    }
  }

  // called after every local mutation
  function touch() {
    revision = Date.now();
    save();
    pushState();
  }

  const mainBtn = document.getElementById('mainBtn');
  const runningTimer = document.getElementById('runningTimer');
  const logList = document.getElementById('logList');
  const statusEl = document.getElementById('status');

  function fmtDur(ms) {
    const s = Math.round(ms / 1000);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return m > 0 ? `${m}:${sec.toString().padStart(2,'0')}` : `${sec}s`;
  }
  function fmtGap(ms) {
    const s = Math.round(ms / 1000);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    if (m === 0) return `${sec}s`;
    return `${m}m ${sec}s`;
  }
  function fmtClock(ts) {
    return new Date(ts).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
  }

  function render() {
    const n = contractions.length;
    document.getElementById('total').textContent = n;

    if (n >= 2) {
      const recent = contractions.slice(-6);
      const gaps = [];
      for (let i = 1; i < recent.length; i++) gaps.push(recent[i].start - recent[i-1].start);
      const last5gaps = gaps.slice(-5);
      const avgGap = last5gaps.reduce((a,b)=>a+b,0)/last5gaps.length;
      document.getElementById('avgFreq').textContent = fmtGap(avgGap);
      document.getElementById('lastGap').textContent = fmtGap(gaps[gaps.length-1]);
      updateStatus(avgGap);
    } else {
      document.getElementById('avgFreq').textContent = '—';
      document.getElementById('lastGap').textContent = '—';
      statusEl.className = 'status';
      statusEl.textContent = n === 1 ? 'First contraction logged — keep tracking' : 'Waiting for first contraction';
    }

    if (n >= 1) {
      const last5 = contractions.slice(-5);
      const avgD = last5.reduce((a,b)=>a+b.duration,0)/last5.length;
      document.getElementById('avgDur').textContent = fmtDur(avgD);
    } else {
      document.getElementById('avgDur').textContent = '—';
    }

    if (n === 0) {
      logList.innerHTML = '<li class="empty">No contractions yet.</li>';
      return;
    }
    logList.innerHTML = '';
    for (let i = contractions.length - 1; i >= 0; i--) {
      const c = contractions[i];
      const li = document.createElement('li');
      let gapTxt = '';
      if (i > 0) gapTxt = fmtGap(c.start - contractions[i-1].start);
      li.innerHTML = `<span class="time">${fmtClock(c.start)}</span>
                      <span class="dur">${fmtDur(c.duration)}</span>
                      <span class="gap">${gapTxt}</span>`;
      logList.appendChild(li);
    }
  }

  function updateStatus(avgGap) {
    const mins = avgGap / 60000;
    const last5 = contractions.slice(-5);
    const avgD = last5.reduce((a,b)=>a+b.duration,0)/last5.length / 60000;
    statusEl.className = 'status';
    if (mins <= 5 && avgD >= 0.9) {
      statusEl.className = 'status go';
      statusEl.textContent = '5-1-1 reached — call fødetelefon 51 80 42 01';
    } else if (mins <= 8) {
      statusEl.className = 'status soon';
      statusEl.textContent = 'Getting closer — keep tracking, prep to go';
    } else {
      statusEl.textContent = 'Early labour — rest, hydrate, conserve energy';
    }
  }

  function startTick() {
    tick = setInterval(() => {
      runningTimer.textContent = fmtDur(Date.now() - active.start);
    }, 250);
  }

  // single place that makes the button/timer reflect `active` (local taps AND remote sync)
  function updateMainUI() {
    if (active) {
      mainBtn.textContent = 'Stop contraction';
      mainBtn.className = 'bigbtn stop';
      runningTimer.classList.remove('hidden');
      if (!tick) startTick();
    } else {
      if (tick) { clearInterval(tick); tick = null; }
      mainBtn.textContent = 'Start contraction';
      mainBtn.className = 'bigbtn start';
      runningTimer.classList.add('hidden');
      runningTimer.textContent = '0:00';
    }
  }

  mainBtn.addEventListener('click', () => {
    if (!active) {
      active = { start: Date.now() };
      updateMainUI();
      touch();
    } else {
      active.end = Date.now();
      active.duration = active.end - active.start;
      contractions.push(active);
      active = null;
      updateMainUI();
      render();
      touch();
    }
  });

  document.getElementById('undoBtn').addEventListener('click', () => {
    if (active) {
      active = null;
      updateMainUI();
    } else if (contractions.length) {
      contractions.pop();
      render();
    }
    touch();
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    if (confirm('Clear the whole log?')) {
      contractions = [];
      active = null;
      updateMainUI();
      render();
      touch();
    }
  });

  // ---- init: restore state, then sync ----
  load();
  updateMainUI();
  render();
  setSyncNote(syncOk);
  pull();
  setInterval(pull, POLL_MS);
  document.addEventListener('visibilitychange', () => { if (!document.hidden) pull(); });
  window.addEventListener('online', pull);
</script>
</body>
</html>
