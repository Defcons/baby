<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby</title>
<style>
  :root {
    --bg: #14110f;
    --card: #1e1a17;
    --border: #2c2621;
    --text: #f0ece6;
    --muted: #8a827a;
  }
  html[data-theme="light"] {
    --bg: #f7f1ea;
    --card: #fffdfa;
    --border: #e7dccd;
    --text: #3d332b;
    --muted: #95877a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 16px;
    max-width: 560px;
    margin: 0 auto;
  }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; letter-spacing: -0.01em; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .apps { display: grid; gap: 12px; }
  .app {
    display: flex; align-items: center; gap: 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 16px;
    text-decoration: none;
    color: var(--text);
    transition: transform 0.08s;
  }
  .app:active { transform: scale(0.98); }
  .app .ico { font-size: 30px; }
  .app .name { font-size: 16px; font-weight: 600; }
  .app .desc { font-size: 12px; color: var(--muted); margin-top: 2px; }
</style>
<script>document.documentElement.dataset.theme = (function(){ try { return localStorage.getItem('ctTheme') || localStorage.getItem('btTheme') || 'dark'; } catch(e) { return 'dark'; } })();</script>
</head>
<body>
  <h1>Baby</h1>
  <div class="sub">Our little apps.</div>
  <div class="apps">
    <a class="app" href="baby-tracker/">
      <span class="ico">🍼</span>
      <span>
        <span class="name">Baby Tracker</span>
        <span class="desc" style="display:block;">Feeds, diapers &amp; sleep</span>
      </span>
    </a>
    <a class="app" href="contraction-tracker/">
      <span class="ico">⏱️</span>
      <span>
        <span class="name">Contraction Timer</span>
        <span class="desc" style="display:block;">Timing &amp; 5-1-1 guidance</span>
      </span>
    </a>
  </div>
</body>
</html>
